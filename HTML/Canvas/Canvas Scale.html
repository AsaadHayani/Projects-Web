<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Canvas</title>
      <style>
            canvas {
                  width: 650px;
                  height: 400px;
                  margin: 100px 200px;
                  border: 2px solid red;
            }
      </style>
</head>

<body>
      <canvas id="our-canvas"></canvas>

      <script>
            let theCanvas = document.getElementById("our-canvas"),

                  // Select Context Type
                  theContext = theCanvas.getContext("2d");

            theContext.fillStyle = "green";
            theContext.fillRect(50, 50, 200, 100);

            // The Context Save
            theContext.save();

// Second
      </script>
</body>

</html>
