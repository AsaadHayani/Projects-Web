<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Local Storage</title>
	<style>

	</style>
</head>

<body>
	<!-- // -->

	<script>
		localStorage.setItem('lang1', 'html');// [Create],[Update]
		localStorage.setItem('lang2', 'css');
		localStorage.setItem('lang3', 'js');
		console.log(localStorage.getItem('lang1'));// [Reade]
		localStorage.removeItem('lang3');// [Delete]
		console.log(localStorage.getItem('lang3'));
		localStorage.clear();// [Clear Everything]

		localStorage.setItem('lang1', 'c#');
		localStorage.setItem('lang1', 'java');// update
		localStorage.setItem('lang3', 'python');

		let key = localStorage.key(0);// index
		console.log(localStorage.getItem(key));


		const obj = {
			name: 'asaad'
		}
		localStorage.setItem('item1', JSON.stringify(obj));

		console.log(JSON.parse(localStorage.getItem('item1')));
		localStorage.clear();
		// localStorage.setItem('i', '1');
		if (localStorage.length > 0) {
			console.log('yes');
		} else {
			console.log('no');
		}
	</script>
</body>

</html>
