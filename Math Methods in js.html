<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Math Methods in js</title>
</head>

<body>

    <script>
        function print(text) {
            document.write("<h1>" + text + "</h1>");
        }
        print(Math.PI);
        print(Math.SQRT1_2);

        print(Math.round(1.2));
        print(Math.round(1.7));

        print(Math.ceil(1.7));
        print(Math.ceil(1.00000001));


        print(Math.floor(1.7));
        print(Math.floor(1.999999999));

        print(Math.abs(-150));//القيمة المطلقة

        print(Math.pow(6, 3));//الاس

        print(Math.sqrt(64));//الجذر التربيعي

        print(Math.random());
        print(Math.random() * 10);
        print((Math.random() * 10) + 1);
        print((Math.random() * 10) + 0);
        print(Math.floor(Math.random() * 10) + 1);
        print(Math.random());

        function myRand(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        print("1:10 => " + myRand(1, 10));
        print("50:55 => " + myRand(50, 55));
        print("0:10 => " + myRand(0, 10));
        print("100:120 => " + myRand(100, 120));

        var min = Math.min(105, 104, 200, 1, 3, 6, -2);
        var max = Math.max(105, 104, 200, 1, 3, 6, -2);
        print(min);
        print(max);

        //Test
        var random = Math.random() * 10;
        print("random:" + random + "<br>");

        var round = Math.round(random);
        print("round:" + round + "<br>");

        var floor = Math.floor(random);
        print("floor:" + floor + "<br>");

        var ceil = Math.ceil(random);
        print("ceil:" + ceil + "<br>");

    </script>
</body>

</html>
